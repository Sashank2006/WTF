<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none" preserveAspectRatio="xMidYMid slice">
  <!-- Cinematic urban night fallback used when face.jpg is missing.
       Procedurally drawn; not a real photograph, but visually consistent
       with the cream-on-black HUD aesthetic. -->

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a1218"/>
      <stop offset="60%"  stop-color="#0a1822"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>

    <radialGradient id="lantern" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#c9602a" stop-opacity="0.8"/>
      <stop offset="40%"  stop-color="#c9602a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9602a" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" stroke="#e8dcc422" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#sky)"/>

  <!-- Distant buildings silhouettes -->
  <g fill="#050a0d">
    <rect x="0"    y="240" width="120" height="360"/>
    <rect x="100"  y="200" width="80"  height="400"/>
    <rect x="180"  y="280" width="140" height="320"/>
    <rect x="320"  y="220" width="100" height="380"/>
    <rect x="420"  y="260" width="180" height="340"/>
    <rect x="600"  y="180" width="90"  height="420"/>
    <rect x="690"  y="240" width="160" height="360"/>
    <rect x="850"  y="220" width="120" height="380"/>
    <rect x="970"  y="270" width="140" height="330"/>
    <rect x="1100" y="230" width="100" height="370"/>
  </g>

  <!-- Lit windows -->
  <g fill="#c9602a" opacity="0.55">
    <rect x="20"   y="320" width="6" height="8"/>
    <rect x="40"   y="360" width="6" height="8"/>
    <rect x="220"  y="330" width="6" height="8"/>
    <rect x="240"  y="380" width="6" height="8"/>
    <rect x="450"  y="320" width="6" height="8"/>
    <rect x="470"  y="350" width="6" height="8"/>
    <rect x="720"  y="310" width="6" height="8"/>
    <rect x="740"  y="350" width="6" height="8"/>
    <rect x="880"  y="280" width="6" height="8"/>
    <rect x="1000" y="330" width="6" height="8"/>
    <rect x="1020" y="370" width="6" height="8"/>
  </g>

  <!-- Two silhouetted figures in foreground -->
  <g fill="#020608">
    <!-- left figure -->
    <path d="M380 600
             L380 460
             Q380 430 410 430
             Q440 430 440 460
             L440 600 Z"/>
    <circle cx="410" cy="410" r="22"/>
    <!-- right figure -->
    <path d="M470 600
             L470 470
             Q470 440 500 440
             Q530 440 530 470
             L530 600 Z"/>
    <circle cx="500" cy="420" r="22"/>
  </g>

  <!-- Warm lantern glow -->
  <circle cx="900" cy="350" r="160" fill="url(#lantern)"/>
  <rect x="892" y="320" width="16" height="40" fill="#c9602a" opacity="0.7"/>

  <!-- HUD grid overlay -->
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="1200" height="600" fill="url(#vignette)"/>
</svg>